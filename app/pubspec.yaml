name: medexam
description: AI 医考学习 APP - 基于国产大模型的执业医师考试学习平台
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 状态管理
  provider: ^6.1.1

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI 组件
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1

  # 路由
  go_router: ^13.0.0

  # 日期时间
  intl: ^0.19.0

  # 工具
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
